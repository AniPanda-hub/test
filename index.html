<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fellowmate — EVI v7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#faf6f0;color:#3d3a36;display:flex;flex-direction:column;align-items:center;min-height:100vh;min-height:100dvh;padding:20px}
h1{font-size:1.3rem;margin-bottom:4px;font-weight:500}
.sub{font-size:.72rem;color:#8a847a;margin-bottom:20px}
#status{font-size:.8rem;font-weight:600;margin-bottom:16px;min-height:24px;text-align:center;color:#7a9e7e}
#status.err{color:#c4836a}
.cfg{background:white;border-radius:12px;padding:16px;width:min(460px,92vw);margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.cfg label{font-size:.64rem;font-weight:700;color:#8a847a;display:block;margin-bottom:3px}
.cfg input{width:100%;padding:10px 12px;border:1.5px solid #e0d5c5;border-radius:8px;font-size:16px;margin-bottom:8px;background:#faf6f0;-webkit-appearance:none}
.startbtn{padding:14px 32px;border:none;border-radius:12px;background:#7a9e7e;color:white;font-size:.9rem;font-weight:600;cursor:pointer;margin-bottom:16px;-webkit-tap-highlight-color:transparent}
.startbtn:disabled{background:#b8b0a4}
.mic{width:80px;height:80px;border-radius:50%;border:3px solid #e0d5c5;font-size:2rem;cursor:pointer;background:white;margin-bottom:16px;display:none;-webkit-tap-highlight-color:transparent}
.mic:disabled{opacity:.4}
.mic.rec{background:#c4836a;border-color:#c4836a}
.mic.wait{background:#c9a84c;border-color:#c9a84c}
.mic.ready{background:#7a9e7e;border-color:#7a9e7e}
.chat{width:min(460px,92vw);flex:1;overflow-y:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.m{display:flex;gap:8px;margin-bottom:10px}.m.u{flex-direction:row-reverse}
.b{padding:10px 14px;border-radius:14px;font-size:.82rem;line-height:1.55;max-width:82%}
.b.a{background:white;border:1px solid #e0d5c5}.b.u{background:#7a9e7e;color:white}
.ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.72rem;flex-shrink:0}
.ic.a{background:#e8f0e8}.ic.u{background:#e6f0f8}
#log{width:min(460px,92vw);background:#222;color:#8f8;border-radius:10px;padding:8px;font-size:.55rem;max-height:100px;overflow-y:auto;font-family:monospace;white-space:pre-wrap;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<h1>Fellowmate EVI v7</h1>
<p class="sub">iPad compatible · Push-to-talk</p>
<div id="status">Enter your Hume key and start</div>

<div class="cfg" id="cfgPanel">
  <label>Hume API Key</label>
  <input id="hk" type="text" placeholder="Paste Hume API key" autocomplete="off" autocorrect="off">
  <label>EVI Config ID</label>
  <input id="ci" value="f933806f-4107-4d5e-a420-1b81eb97ddc7" autocomplete="off">
</div>

<button class="startbtn" id="startBtn" onclick="startConversation()">Start Conversation with Meena</button>
<button class="mic" id="mic" onclick="micTap()">🎙️</button>

<div class="chat" id="chat"></div>
<div id="log">Ready</div>

<script>
'use strict';

var state='idle';
var ws=null,micStream=null,rec=null;

// SINGLE audio element — reused for all playback (iOS requirement)
var player=new Audio();
var audioQueue=[];// blob URLs waiting to play
var assistantDone=false;

function L(s){var el=document.getElementById('log');el.textContent=t()+' '+s+'\n'+el.textContent.slice(0,2000);console.log(s);}
function t(){return new Date().toLocaleTimeString();}
function S(s,e){document.getElementById('status').textContent=s;document.getElementById('status').className=e?'err':'';}

function addMsg(who,txt){
  var c=document.getElementById('chat'),d=document.createElement('div');
  d.className='m'+(who==='u'?' u':'');
  d.innerHTML='<div class="ic '+(who==='u'?'u':'a')+'">'+(who==='u'?'🩺':'👩')+'</div><div class="b '+(who==='u'?'u':'a')+'">'+txt+'</div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}

function showMic(s){
  var m=document.getElementById('mic');
  m.style.display='block';
  m.disabled=(s==='wait');
  m.className='mic'+(s==='rec'?' rec':s==='wait'?' wait':s==='ready'?' ready':'');
  m.textContent=s==='rec'?'⏹️':'🎙️';
}

// ═══ AUDIO — single player, WAV format, queue ═══

// Prime the player on user gesture (required for iOS)
function primeAudio(){
  player.src='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
  player.volume=1;
  player.play().then(function(){L('Audio primed');}).catch(function(){L('Prime failed (ok)');});
}

function enqueueAudio(base64){
  // Hume sends WAV audio
  try{
    var raw=atob(base64);
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
    var blob=new Blob([bytes],{type:'audio/wav'});
    var url=URL.createObjectURL(blob);
    audioQueue.push(url);
    L('Queued chunk ('+bytes.length+' bytes, queue: '+audioQueue.length+')');
    // Start playing if idle
    if(player.paused&&!player._playing)playNext();
  }catch(e){L('Queue err: '+e.message);}
}

function playNext(){
  if(audioQueue.length===0){
    player._playing=false;
    if(assistantDone){
      assistantDone=false;
      onDoneSpeaking();
    }
    return;
  }
  player._playing=true;
  var url=audioQueue.shift();

  player.onended=function(){
    URL.revokeObjectURL(url);
    L('▶ Chunk done (queue: '+audioQueue.length+')');
    playNext();
  };
  player.onerror=function(){
    L('▶ Chunk error');
    URL.revokeObjectURL(url);
    playNext();
  };

  player.src=url;
  player.play().then(function(){
    L('▶ Playing chunk');
  }).catch(function(e){
    L('▶ Play fail: '+e.message);
    URL.revokeObjectURL(url);
    playNext();
  });
}

function stopAudio(){
  try{player.pause();player.currentTime=0;}catch(e){}
  audioQueue.forEach(function(u){try{URL.revokeObjectURL(u);}catch(e){}});
  audioQueue=[];
  player._playing=false;
  assistantDone=false;
}

function onDoneSpeaking(){
  state='ready';
  showMic('ready');
  S('🟢 Your turn — tap mic to speak');
  L('Ready for input');
}

// ═══ WEBSOCKET ═══
function connectWS(onOpen){
  var key=document.getElementById('hk').value.trim();
  var cfg=document.getElementById('ci').value.trim();
  if(!key){S('Enter Hume API key',1);return;}

  if(ws)try{ws.close();}catch(e){}
  stopAudio();

  ws=new WebSocket('wss://api.hume.ai/v0/evi/chat?api_key='+encodeURIComponent(key)+'&config_id='+encodeURIComponent(cfg));

  ws.onopen=function(){L('WS OPEN');onOpen();};

  ws.onmessage=function(e){
    var m;try{m=JSON.parse(e.data);}catch(x){return;}

    if(m.type==='user_message'){
      if(m.message&&m.message.content){
        addMsg('u',m.message.content);
        L('YOU: '+m.message.content.slice(0,60));
      }
    }
    else if(m.type==='assistant_message'){
      if(m.message&&m.message.content){
        addMsg('a',m.message.content);
        L('MEENA: '+m.message.content.slice(0,60));
      }
      showMic('wait');
      S('Meena speaking…');
    }
    else if(m.type==='audio_output'){
      if(m.data)enqueueAudio(m.data);
    }
    else if(m.type==='assistant_end'){
      L('assistant_end');
      assistantDone=true;
      if(!player._playing)onDoneSpeaking();
    }
    else if(m.type==='user_interruption'){
      L('INTERRUPTED');
      stopAudio();
      onDoneSpeaking();
    }
    else if(m.type==='error'){
      L('ERR: '+(m.message||m.code||'?'));
      S('Error: '+(m.message||'?'),1);
    }
    else{
      L('> '+m.type);
    }
  };

  ws.onerror=function(){L('WS ERR');S('Connection failed',1);state='idle';};
  ws.onclose=function(e){
    L('WS CLOSE '+e.code);
    if(state!=='idle'){
      state='idle';S('Disconnected');
      document.getElementById('mic').style.display='none';
      document.getElementById('startBtn').disabled=false;
      document.getElementById('cfgPanel').style.display='block';
    }
  };
}

// ═══ START ═══
function startConversation(){
  primeAudio();// MUST be in click handler for iOS
  document.getElementById('startBtn').disabled=true;
  document.getElementById('cfgPanel').style.display='none';
  state='connecting';
  S('Connecting to Meena…');

  connectWS(function(){
    state='waiting_intro';
    S('Meena is thinking…');
    showMic('wait');
    L('Connected — waiting for intro');
  });
}

// ═══ PUSH TO TALK ═══
async function micTap(){
  primeAudio();// Re-prime on each tap (iOS safety)

  if(state==='recording'){
    // STOP and send
    stopRec();
    state='waiting_reply';
    showMic('wait');
    S('Meena is thinking…');
    L('Stopped recording');
    return;
  }

  if(state==='ready'){
    // START recording
    var ok=await startRec();
    if(ok){
      state='recording';
      showMic('rec');
      S('🔴 Recording… tap mic when done');
      L('Recording started');
    }
    return;
  }
}

async function startRec(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
    });
  }catch(e){S('Mic blocked — allow in browser settings',1);L('MIC: '+e.message);return false;}

  // Find supported format (iPad uses mp4, Chrome uses webm)
  var mime='';
  var tryTypes=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/aac',''];
  for(var i=0;i<tryTypes.length;i++){
    if(tryTypes[i]===''||MediaRecorder.isTypeSupported(tryTypes[i])){
      mime=tryTypes[i];break;
    }
  }
  L('REC mime: '+(mime||'browser default'));

  try{
    rec=new MediaRecorder(micStream,mime?{mimeType:mime}:{});
    rec.ondataavailable=function(e){
      if(e.data.size>0&&ws&&ws.readyState===1){
        var r=new FileReader();
        r.onloadend=function(){
          var b=r.result.split(',')[1];
          if(b){
            ws.send(JSON.stringify({type:'audio_input',data:b}));
          }
        };
        r.readAsDataURL(e.data);
      }
    };
    rec.start(250);// 250ms chunks
    return true;
  }catch(e){L('REC err: '+e.message);return false;}
}

function stopRec(){
  if(rec&&rec.state!=='inactive')try{rec.stop();}catch(e){}
  if(micStream){micStream.getTracks().forEach(function(t){t.stop();});micStream=null;}
  rec=null;
}
</script>
</body>
</html>
