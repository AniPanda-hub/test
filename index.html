<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fellowmate — EVI Test v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#faf6f0;color:#3d3a36;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:1.2rem;margin-bottom:4px}
.subtitle{font-size:.75rem;color:#8a847a;margin-bottom:20px}
.status{font-size:.72rem;color:#7a9e7e;font-weight:600;margin-bottom:16px;min-height:20px;text-align:center}
.status.error{color:#c4836a}
.config{background:white;border-radius:12px;padding:16px;width:min(500px,90vw);margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.config label{font-size:.68rem;font-weight:700;color:#8a847a;display:block;margin-bottom:4px}
.config input{width:100%;padding:8px 12px;border:1.5px solid #e0d5c5;border-radius:8px;font-size:.8rem;margin-bottom:10px;background:#faf6f0}
.config input:focus{outline:none;border-color:#7a9e7e}
.mic-btn{width:80px;height:80px;border-radius:50%;border:none;font-size:2rem;cursor:pointer;
  background:white;box-shadow:0 4px 16px rgba(0,0,0,.08);transition:all .3s;margin-bottom:16px}
.mic-btn:hover{transform:scale(1.05)}
.mic-btn.recording{background:#7a9e7e;animation:pulse 1.5s infinite}
.mic-btn.speaking{background:#c9a84c}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(122,158,126,.4)}50%{box-shadow:0 0 0 16px rgba(122,158,126,0)}}
.chat{width:min(500px,90vw);flex:1;overflow-y:auto;margin-bottom:16px}
.msg{display:flex;gap:8px;margin-bottom:12px;align-items:flex-start}
.msg.you{flex-direction:row-reverse}
.bubble{padding:10px 14px;border-radius:14px;font-size:.82rem;line-height:1.5;max-width:80%}
.bubble.ai{background:white;border:1px solid #e0d5c5}
.bubble.you{background:#7a9e7e;color:white}
.icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.icon.ai{background:#e8f0e8}
.icon.you{background:#e6f0f8}
.log{width:min(500px,90vw);background:white;border-radius:12px;padding:12px;font-size:.65rem;color:#8a847a;max-height:150px;overflow-y:auto;font-family:monospace;white-space:pre-wrap}
</style>
</head>
<body>
<h1>Fellowmate — EVI Test v2</h1>
<p class="subtitle">Fixed: smooth audio + echo prevention</p>
<div class="status" id="status">Enter Hume key and tap mic</div>

<div class="config">
  <label>Hume API Key</label>
  <input id="humeKey" type="password" placeholder="Your Hume API key">
  <label>EVI Config ID (Meena)</label>
  <input id="configId" type="text" value="f933806f-4107-4d5e-a420-1b81eb97ddc7">
</div>

<button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙️</button>

<div class="chat" id="chat"></div>
<div class="log" id="log">Ready.</div>

<script>
'use strict';

var ws=null,connected=false,micStream=null,recorder=null,isRecording=false;
var currentAudio=null,isSpeaking=false;
var pendingAudioChunks=[];

function log(msg){
  var el=document.getElementById('log');
  el.textContent=new Date().toLocaleTimeString()+' '+msg+'\n'+el.textContent.substring(0,2000);
  console.log('[EVI]',msg);
}

function setStatus(msg,err){
  document.getElementById('status').textContent=msg;
  document.getElementById('status').className='status'+(err?' error':'');
}

function setBtnState(state){
  var btn=document.getElementById('micBtn');
  btn.className='mic-btn'+(state==='recording'?' recording':state==='speaking'?' speaking':'');
  btn.textContent=state==='off'?'🎙️':'⏹️';
}

function addMsg(who,text){
  var chat=document.getElementById('chat');
  var div=document.createElement('div');
  div.className='msg'+(who==='you'?' you':'');
  div.innerHTML='<div class="icon '+(who==='you'?'you':'ai')+'">'+(who==='you'?'🩺':'👩')+'</div><div class="bubble '+(who==='you'?'you':'ai')+'">'+text+'</div>';
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}

/* ── Play all chunks as ONE audio (no cracking) ── */
function playCollectedAudio(){
  if(pendingAudioChunks.length===0){
    isSpeaking=false;
    resumeMic();
    return;
  }

  isSpeaking=true;
  setBtnState('speaking');
  setStatus('Meena speaking…');

  var binaryParts=[];
  pendingAudioChunks.forEach(function(b64){
    try{
      var raw=atob(b64);
      var bytes=new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
      binaryParts.push(bytes);
    }catch(e){}
  });
  pendingAudioChunks=[];

  if(binaryParts.length===0){isSpeaking=false;resumeMic();return;}

  var blob=new Blob(binaryParts,{type:'audio/mp3'});
  var url=URL.createObjectURL(blob);
  currentAudio=new Audio(url);

  currentAudio.onended=function(){
    URL.revokeObjectURL(url);currentAudio=null;isSpeaking=false;
    log('Playback done');
    resumeMic();
  };
  currentAudio.onerror=function(){
    currentAudio=null;isSpeaking=false;
    log('Audio error');
    resumeMic();
  };

  log('Playing '+binaryParts.length+' chunks as one ('+blob.size+' bytes)');
  currentAudio.play().catch(function(e){
    log('Play blocked: '+e.message);
    isSpeaking=false;resumeMic();
  });
}

function stopPlayback(){
  if(currentAudio){try{currentAudio.pause();currentAudio.src='';}catch(e){}}
  currentAudio=null;pendingAudioChunks=[];isSpeaking=false;
}

/* ── Mute/unmute mic to prevent echo ── */
function muteMic(){
  if(micStream){
    micStream.getAudioTracks().forEach(function(t){t.enabled=false;});
    log('Mic MUTED');
  }
}

function resumeMic(){
  if(micStream&&isRecording){
    micStream.getAudioTracks().forEach(function(t){t.enabled=true;});
    setBtnState('recording');
    setStatus('Your turn — speak to Meena');
    log('Mic UNMUTED — listening');
  }
}

/* ── WebSocket ── */
function connectEVI(onReady){
  var key=document.getElementById('humeKey').value.trim();
  var config=document.getElementById('configId').value.trim();
  if(!key){setStatus('Enter Hume API key',true);return;}

  if(ws){try{ws.close();}catch(e){}}
  pendingAudioChunks=[];isSpeaking=false;

  var url='wss://api.hume.ai/v0/evi/chat?api_key='+encodeURIComponent(key)+'&config_id='+encodeURIComponent(config);
  log('Connecting…');
  setStatus('Connecting…');

  ws=new WebSocket(url);

  ws.onopen=function(){
    connected=true;
    log('WebSocket OPEN');
    if(onReady)onReady(true);
  };

  ws.onmessage=function(e){
    try{
      var msg=JSON.parse(e.data);

      if(msg.type==='user_message'){
        if(msg.message&&msg.message.content){
          addMsg('you',msg.message.content);
          log('You: "'+msg.message.content.substring(0,50)+'"');
        }
        // Mute mic — Meena is about to speak
        muteMic();
      }

      else if(msg.type==='assistant_message'){
        if(msg.message&&msg.message.content){
          addMsg('ai',msg.message.content);
          log('Meena: "'+msg.message.content.substring(0,50)+'"');
        }
      }

      else if(msg.type==='audio_output'){
        if(msg.data)pendingAudioChunks.push(msg.data);
      }

      else if(msg.type==='assistant_end'){
        log('assistant_end — '+pendingAudioChunks.length+' chunks queued');
        playCollectedAudio();
      }

      else if(msg.type==='user_interruption'){
        log('Interrupted');
        stopPlayback();
        resumeMic();
      }

      else if(msg.type==='error'){
        log('ERROR: '+(msg.message||JSON.stringify(msg)));
        setStatus('Error',true);
      }

    }catch(err){log('Parse: '+err.message);}
  };

  ws.onerror=function(){
    log('WS ERROR');connected=false;
    setStatus('Connection error',true);
    if(onReady)onReady(false);
  };

  ws.onclose=function(e){
    log('WS CLOSED code='+e.code);
    connected=false;
    if(isRecording){stopRecording();setBtnState('off');setStatus('Disconnected');}
  };
}

/* ── Recording ── */
async function startRecording(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
    });
  }catch(e){setStatus('Mic blocked',true);return false;}

  var mime='audio/webm;codecs=opus';
  if(!MediaRecorder.isTypeSupported(mime)){mime='audio/webm';if(!MediaRecorder.isTypeSupported(mime))mime='';}

  try{
    recorder=new MediaRecorder(micStream,mime?{mimeType:mime}:{});
    recorder.ondataavailable=function(e){
      // Only send if mic is enabled (not muted) and not speaking
      if(e.data.size>0&&ws&&ws.readyState===WebSocket.OPEN&&!isSpeaking){
        var reader=new FileReader();
        reader.onloadend=function(){
          var b64=reader.result.split(',')[1];
          if(b64)ws.send(JSON.stringify({type:'audio_input',data:b64}));
        };
        reader.readAsDataURL(e.data);
      }
    };
    recorder.start(200);
    isRecording=true;
    log('Recording started');
    setStatus('Listening… speak to Meena');
    return true;
  }catch(e){log('Recorder: '+e.message);return false;}
}

function stopRecording(){
  isRecording=false;
  if(recorder&&recorder.state!=='inactive')try{recorder.stop();}catch(e){}
  if(micStream){micStream.getTracks().forEach(function(t){t.stop();});micStream=null;}
}

/* ── Toggle ── */
async function toggleMic(){
  if(isRecording||isSpeaking){
    stopPlayback();stopRecording();
    if(ws)try{ws.close();}catch(e){}
    setBtnState('off');
    setStatus('Tap mic to start');
    return;
  }

  setBtnState('recording');
  connectEVI(function(ok){
    if(!ok){setBtnState('off');return;}
    startRecording().then(function(ok){if(!ok)setBtnState('off');});
  });
}
</script>
</body>
</html>
