<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fellowmate — EVI v5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#faf6f0;color:#3d3a36;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:1.3rem;margin-bottom:4px;font-weight:500}
.sub{font-size:.72rem;color:#8a847a;margin-bottom:20px}
#status{font-size:.8rem;font-weight:600;margin-bottom:16px;min-height:24px;text-align:center;color:#7a9e7e}
#status.err{color:#c4836a}
.cfg{background:white;border-radius:12px;padding:16px;width:min(460px,92vw);margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.cfg label{font-size:.64rem;font-weight:700;color:#8a847a;display:block;margin-bottom:3px}
.cfg input{width:100%;padding:8px 12px;border:1.5px solid #e0d5c5;border-radius:8px;font-size:.78rem;margin-bottom:8px;background:#faf6f0}
.startbtn{padding:12px 32px;border:none;border-radius:12px;background:#7a9e7e;color:white;font-size:.9rem;font-weight:600;cursor:pointer;margin-bottom:16px;transition:all .2s}
.startbtn:hover{background:#6b8e6f}
.startbtn:disabled{background:#b8b0a4;cursor:default}
.mic{width:72px;height:72px;border-radius:50%;border:3px solid #e0d5c5;font-size:1.8rem;cursor:pointer;background:white;transition:all .2s;margin-bottom:16px;display:none}
.mic:disabled{opacity:.4;cursor:default}
.mic.rec{background:#c4836a;border-color:#c4836a;animation:pulse 1s infinite}
.mic.wait{background:#c9a84c;border-color:#c9a84c}
.mic.ready{background:#7a9e7e;border-color:#7a9e7e}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(196,131,106,.4)}50%{box-shadow:0 0 0 12px rgba(196,131,106,0)}}
.chat{width:min(460px,92vw);flex:1;overflow-y:auto;margin-bottom:12px}
.m{display:flex;gap:8px;margin-bottom:10px}.m.u{flex-direction:row-reverse}
.b{padding:10px 14px;border-radius:14px;font-size:.82rem;line-height:1.55;max-width:82%}
.b.a{background:white;border:1px solid #e0d5c5}.b.u{background:#7a9e7e;color:white}
.ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.72rem;flex-shrink:0}
.ic.a{background:#e8f0e8}.ic.u{background:#e6f0f8}
#log{width:min(460px,92vw);background:#222;color:#8f8;border-radius:10px;padding:8px;font-size:.58rem;max-height:120px;overflow-y:auto;font-family:monospace;white-space:pre-wrap}
</style>
</head>
<body>
<h1>Fellowmate EVI v5</h1>
<p class="sub">Push-to-talk · Gapless audio playback</p>
<div id="status">Enter your Hume key and start</div>

<div class="cfg" id="cfgPanel">
  <label>Hume API Key</label>
  <input id="hk" type="password" placeholder="Paste Hume API key">
  <label>EVI Config ID</label>
  <input id="ci" value="f933806f-4107-4d5e-a420-1b81eb97ddc7">
</div>

<button class="startbtn" id="startBtn" onclick="startConversation()">Start Conversation with Meena</button>
<button class="mic" id="mic" onclick="micTap()" disabled>🎙️</button>

<div class="chat" id="chat"></div>
<div id="log">Ready</div>

<script>
'use strict';

var state='idle'; // idle|connecting|waiting_intro|playing|ready|recording|waiting_reply
var ws=null,stream=null,rec=null,actx=null;

// Audio scheduling
var audioBuffers=[];   // decoded AudioBuffers waiting to play
var scheduleTime=0;    // next play time in AudioContext timeline
var lastSource=null;   // last playing source (to detect when all done)
var playCheckTimer=null;

function L(s){var el=document.getElementById('log');el.textContent=t()+' '+s+'\n'+el.textContent.slice(0,2500);console.log(s);}
function t(){return new Date().toLocaleTimeString();}
function S(s,e){document.getElementById('status').textContent=s;document.getElementById('status').className=e?'err':'';}

function addMsg(who,txt){
  var c=document.getElementById('chat'),d=document.createElement('div');
  d.className='m'+(who==='u'?' u':'');
  d.innerHTML='<div class="ic '+(who==='u'?'u':'a')+'">'+(who==='u'?'🩺':'👩')+'</div><div class="b '+(who==='u'?'u':'a')+'">'+txt+'</div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}

function showMic(s){
  var m=document.getElementById('mic');
  m.style.display='block';
  m.disabled=(s==='wait');
  m.className='mic'+(s==='rec'?' rec':s==='wait'?' wait':s==='ready'?' ready':'');
  m.textContent=s==='rec'?'⏹️':'🎙️';
}

// ═══ AudioContext ═══
function ensureAudio(){
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended')actx.resume();
}

// Decode one base64 chunk into an AudioBuffer
function decodeChunk(b64,cb){
  try{
    var raw=atob(b64);
    var arr=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
    actx.decodeAudioData(arr.buffer.slice(0),function(buf){cb(buf);},function(e){L('Decode err: '+e);cb(null);});
  }catch(e){L('Chunk err: '+e.message);cb(null);}
}

// Schedule a decoded buffer to play at the right time (gapless)
function scheduleBuffer(buf){
  if(!buf)return;
  var src=actx.createBufferSource();
  src.buffer=buf;
  src.connect(actx.destination);

  var now=actx.currentTime;
  if(scheduleTime<now)scheduleTime=now;

  src.start(scheduleTime);
  scheduleTime+=buf.duration;
  lastSource=src;
}

// Called when assistant_end arrives — start checking when playback finishes
function waitForPlaybackEnd(){
  clearInterval(playCheckTimer);
  playCheckTimer=setInterval(function(){
    if(actx.currentTime>=scheduleTime-0.05){
      clearInterval(playCheckTimer);
      L('All audio played');
      onSpeakDone();
    }
  },100);
}

function stopAllAudio(){
  clearInterval(playCheckTimer);
  scheduleTime=0;audioBuffers=[];
  // Can't easily stop scheduled sources, but they'll finish soon
}

function onSpeakDone(){
  state='ready';
  showMic('ready');
  S('🟢 Your turn — tap mic to speak');
  L('Ready for input');
}

// ═══ WEBSOCKET ═══
function connectWS(onOpen){
  var key=document.getElementById('hk').value.trim();
  var cfg=document.getElementById('ci').value.trim();
  if(!key){S('Enter Hume API key',1);return;}

  if(ws)try{ws.close();}catch(e){}
  scheduleTime=0;

  ws=new WebSocket('wss://api.hume.ai/v0/evi/chat?api_key='+encodeURIComponent(key)+'&config_id='+encodeURIComponent(cfg));

  ws.onopen=function(){L('WS OPEN');onOpen();};

  ws.onmessage=function(e){
    var m;try{m=JSON.parse(e.data);}catch(x){return;}

    if(m.type==='user_message'){
      if(m.message&&m.message.content){
        addMsg('u',m.message.content);
        L('YOU: '+m.message.content.slice(0,60));
      }
    }
    else if(m.type==='assistant_message'){
      if(m.message&&m.message.content){
        addMsg('a',m.message.content);
        L('MEENA: '+m.message.content.slice(0,60));
      }
      // Show speaking state
      state='playing';
      showMic('wait');
      S('Meena speaking…');
    }
    else if(m.type==='audio_output'){
      if(m.data){
        // Decode and schedule immediately — gapless playback
        decodeChunk(m.data,function(buf){
          if(buf){
            scheduleBuffer(buf);
            L('Scheduled chunk ('+buf.duration.toFixed(2)+'s) at t='+scheduleTime.toFixed(2));
          }
        });
      }
    }
    else if(m.type==='assistant_end'){
      L('assistant_end — waiting for audio to finish');
      waitForPlaybackEnd();
    }
    else if(m.type==='user_interruption'){
      L('INTERRUPTED');
      stopAllAudio();
      onSpeakDone();
    }
    else if(m.type==='error'){
      L('ERR: '+(m.message||m.code||JSON.stringify(m).slice(0,100)));
      S('Error',1);
    }
    else{
      L('> '+m.type);
    }
  };

  ws.onerror=function(){L('WS ERR');S('Connection failed',1);state='idle';};
  ws.onclose=function(e){
    L('WS CLOSE '+e.code);
    if(state!=='idle'){
      state='idle';S('Disconnected');
      document.getElementById('mic').style.display='none';
      document.getElementById('startBtn').disabled=false;
      document.getElementById('cfgPanel').style.display='block';
    }
  };
}

// ═══ START ═══
function startConversation(){
  ensureAudio();
  document.getElementById('startBtn').disabled=true;
  document.getElementById('cfgPanel').style.display='none';
  state='connecting';
  S('Connecting to Meena…');

  connectWS(function(){
    state='waiting_intro';
    S('Meena is thinking…');
    showMic('wait');
    // Reset schedule time to now
    scheduleTime=actx.currentTime;
    L('Connected — waiting for intro');
  });
}

// ═══ PUSH TO TALK ═══
async function micTap(){
  if(state==='recording'){
    // STOP → send
    stopRec();
    state='waiting_reply';
    showMic('wait');
    S('Meena is thinking…');
    // Reset schedule for next response
    scheduleTime=actx.currentTime;
    L('Stopped — waiting for Meena');
    return;
  }

  if(state==='ready'){
    // START recording
    var ok=await startRec();
    if(ok){
      state='recording';
      showMic('rec');
      S('🔴 Recording… tap mic when done');
      L('Recording');
    }
    return;
  }
}

async function startRec(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
    });
  }catch(e){S('Mic blocked',1);return false;}

  var mime='audio/webm;codecs=opus';
  if(!MediaRecorder.isTypeSupported(mime)){mime='audio/webm';if(!MediaRecorder.isTypeSupported(mime))mime='';}

  try{
    rec=new MediaRecorder(stream,mime?{mimeType:mime}:{});
    rec.ondataavailable=function(e){
      if(e.data.size>0&&ws&&ws.readyState===1){
        var r=new FileReader();
        r.onloadend=function(){
          var b=r.result.split(',')[1];
          if(b)ws.send(JSON.stringify({type:'audio_input',data:b}));
        };
        r.readAsDataURL(e.data);
      }
    };
    rec.start(200);
    return true;
  }catch(e){L('REC: '+e.message);return false;}
}

function stopRec(){
  if(rec&&rec.state!=='inactive')try{rec.stop();}catch(e){}
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  rec=null;
}
</script>
</body>
</html>
