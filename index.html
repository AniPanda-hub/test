<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fellowmate — EVI Test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#faf6f0;color:#3d3a36;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:1.2rem;margin-bottom:4px}
.subtitle{font-size:.75rem;color:#8a847a;margin-bottom:20px}
.status{font-size:.72rem;color:#7a9e7e;font-weight:600;margin-bottom:16px;min-height:20px;text-align:center}
.status.error{color:#c4836a}
.config{background:white;border-radius:12px;padding:16px;width:min(500px,90vw);margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.config label{font-size:.68rem;font-weight:700;color:#8a847a;display:block;margin-bottom:4px}
.config input{width:100%;padding:8px 12px;border:1.5px solid #e0d5c5;border-radius:8px;font-size:.8rem;margin-bottom:10px;background:#faf6f0}
.config input:focus{outline:none;border-color:#7a9e7e}
.mic-btn{width:80px;height:80px;border-radius:50%;border:none;font-size:2rem;cursor:pointer;
  background:white;box-shadow:0 4px 16px rgba(0,0,0,.08);transition:all .3s;margin-bottom:16px}
.mic-btn:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.mic-btn.recording{background:#c4836a;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(196,131,106,.4)}50%{box-shadow:0 0 0 16px rgba(196,131,106,0)}}
.chat{width:min(500px,90vw);flex:1;overflow-y:auto;margin-bottom:16px}
.msg{display:flex;gap:8px;margin-bottom:12px;align-items:flex-start}
.msg.you{flex-direction:row-reverse}
.bubble{padding:10px 14px;border-radius:14px;font-size:.82rem;line-height:1.5;max-width:80%}
.bubble.ai{background:white;border:1px solid #e0d5c5}
.bubble.you{background:#7a9e7e;color:white}
.icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.icon.ai{background:#e8f0e8}
.icon.you{background:#e6f0f8}
.log{width:min(500px,90vw);background:white;border-radius:12px;padding:12px;font-size:.65rem;color:#8a847a;max-height:150px;overflow-y:auto;font-family:monospace;white-space:pre-wrap}
</style>
</head>
<body>
<h1>Fellowmate — EVI Test</h1>
<p class="subtitle">Minimal Hume EVI voice conversation test</p>
<div class="status" id="status">Enter your Hume API key and EVI config ID below</div>

<div class="config">
  <label>Hume API Key</label>
  <input id="humeKey" type="password" placeholder="Your Hume API key" value="">
  <label>EVI Config ID (Meena)</label>
  <input id="configId" type="text" placeholder="f933806f-4107-4d5e-a420-1b81eb97ddc7" value="f933806f-4107-4d5e-a420-1b81eb97ddc7">
</div>

<button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙️</button>

<div class="chat" id="chat"></div>
<div class="log" id="log">Ready. Click mic to start.</div>

<script>
'use strict';

var ws=null,connected=false,micStream=null,recorder=null,isRecording=false;
var audioQueue=[],isPlaying=false;
var audioContext=null;

function log(msg){
  var el=document.getElementById('log');
  var line=new Date().toLocaleTimeString()+' '+msg;
  el.textContent=line+'\n'+el.textContent.substring(0,2000);
  console.log('[EVI]',msg);
}

function setStatus(msg,err){
  var el=document.getElementById('status');
  el.textContent=msg;
  el.className='status'+(err?' error':'');
}

function addMsg(who,text){
  var chat=document.getElementById('chat');
  var div=document.createElement('div');
  div.className='msg'+(who==='you'?' you':'');
  div.innerHTML='<div class="icon '+(who==='you'?'you':'ai')+'">'+(who==='you'?'🩺':'👩')+'</div><div class="bubble '+(who==='you'?'you':'ai')+'">'+text+'</div>';
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* ── Audio playback queue ── */
function queueAudio(base64Data){
  audioQueue.push(base64Data);
  if(!isPlaying)playNext();
}

function playNext(){
  if(audioQueue.length===0){
    isPlaying=false;
    setStatus('Listening… speak now');
    return;
  }
  isPlaying=true;
  setStatus('Mother speaking…');

  var b64=audioQueue.shift();
  try{
    var raw=atob(b64);
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
    var blob=new Blob([bytes],{type:'audio/mp3'});
    var url=URL.createObjectURL(blob);
    var audio=new Audio(url);
    audio.onended=function(){URL.revokeObjectURL(url);playNext();};
    audio.onerror=function(e){log('Audio play error: '+e.message);playNext();};
    audio.play().catch(function(e){log('Play blocked: '+e.message);playNext();});
  }catch(e){log('Audio decode error: '+e.message);playNext();}
}

function stopPlayback(){
  audioQueue=[];isPlaying=false;
}

/* ── WebSocket ── */
function connectEVI(onReady){
  var key=document.getElementById('humeKey').value.trim();
  var config=document.getElementById('configId').value.trim();
  if(!key){setStatus('Enter Hume API key',true);return;}
  if(!config){setStatus('Enter EVI config ID',true);return;}

  if(ws){try{ws.close();}catch(e){}}
  audioQueue=[];isPlaying=false;

  var url='wss://api.hume.ai/v0/evi/chat?api_key='+encodeURIComponent(key)+'&config_id='+encodeURIComponent(config);
  log('Connecting to: '+url.substring(0,60)+'...');
  setStatus('Connecting to Hume EVI…');

  ws=new WebSocket(url);

  ws.onopen=function(){
    connected=true;
    log('WebSocket OPEN');
    setStatus('Connected! Starting mic…');
    if(onReady)onReady(true);
  };

  ws.onmessage=function(e){
    try{
      var msg=JSON.parse(e.data);
      log('MSG: '+msg.type+(msg.message?' "'+msg.message.content?.substring(0,40)+'"':''));

      if(msg.type==='user_message'){
        if(msg.message&&msg.message.content){
          addMsg('you',msg.message.content);
        }
        // Log emotion scores
        if(msg.models&&msg.models.prosody&&msg.models.prosody.scores){
          var scores=msg.models.prosody.scores;
          var top3=Object.entries(scores).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
          log('Emotions: '+top3.map(function(s){return s[0]+':'+Math.round(s[1]*100);}).join(', '));
        }
      }

      else if(msg.type==='assistant_message'){
        if(msg.message&&msg.message.content){
          addMsg('ai',msg.message.content);
        }
      }

      else if(msg.type==='audio_output'){
        if(msg.data){
          queueAudio(msg.data);
        }
      }

      else if(msg.type==='assistant_end'){
        log('Assistant finished speaking');
      }

      else if(msg.type==='user_interruption'){
        log('User interrupted — stopping playback');
        stopPlayback();
      }

      else if(msg.type==='error'){
        log('ERROR: '+JSON.stringify(msg));
        setStatus('EVI error: '+(msg.message||msg.code||'unknown'),true);
      }

      else{
        log('Other: '+msg.type);
      }

    }catch(err){log('Parse error: '+err.message);}
  };

  ws.onerror=function(e){
    log('WebSocket ERROR');
    setStatus('Connection error',true);
    connected=false;
  };

  ws.onclose=function(e){
    log('WebSocket CLOSED code='+e.code+' reason='+e.reason);
    connected=false;
    if(isRecording){
      setStatus('Disconnected — tap mic to reconnect');
      stopRecording();
    }
  };
}

/* ── Mic recording ── */
async function startRecording(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
    });
    log('Mic access granted');
  }catch(e){
    log('Mic error: '+e.message);
    setStatus('Mic blocked — allow in browser',true);
    return false;
  }

  // Find supported mime type
  var mimeType='audio/webm;codecs=opus';
  if(typeof MediaRecorder!=='undefined'){
    if(!MediaRecorder.isTypeSupported(mimeType)){
      mimeType='audio/webm';
      if(!MediaRecorder.isTypeSupported(mimeType)){
        mimeType='audio/mp4';
        if(!MediaRecorder.isTypeSupported(mimeType)){
          mimeType='';// Let browser choose
        }
      }
    }
  }
  log('MIME type: '+(mimeType||'default'));

  try{
    var opts=mimeType?{mimeType:mimeType}:{};
    recorder=new MediaRecorder(micStream,opts);

    recorder.ondataavailable=function(e){
      if(e.data.size>0&&ws&&ws.readyState===WebSocket.OPEN){
        var reader=new FileReader();
        reader.onloadend=function(){
          var b64=reader.result.split(',')[1];
          if(b64){
            ws.send(JSON.stringify({type:'audio_input',data:b64}));
          }
        };
        reader.readAsDataURL(e.data);
      }
    };

    recorder.start(200);// 200ms chunks
    isRecording=true;
    log('Recording started (200ms chunks)');
    setStatus('Listening… speak to Meena');
    return true;
  }catch(e){
    log('Recorder error: '+e.message);
    setStatus('Recording failed',true);
    return false;
  }
}

function stopRecording(){
  isRecording=false;
  if(recorder&&recorder.state!=='inactive'){
    try{recorder.stop();}catch(e){}
  }
  if(micStream){
    micStream.getTracks().forEach(function(t){t.stop();});
    micStream=null;
  }
  log('Recording stopped');
}

/* ── Toggle mic ── */
async function toggleMic(){
  var btn=document.getElementById('micBtn');

  if(isRecording){
    // Stop everything
    stopRecording();
    if(ws){try{ws.close();}catch(e){}}
    btn.className='mic-btn';
    btn.textContent='🎙️';
    setStatus('Tap mic to start a new conversation');
    return;
  }

  // Start: connect first, then record
  btn.className='mic-btn recording';
  btn.textContent='⏹️';

  connectEVI(function(success){
    if(!success){
      btn.className='mic-btn';
      btn.textContent='🎙️';
      return;
    }
    // WebSocket is open — now start recording
    startRecording().then(function(ok){
      if(!ok){
        btn.className='mic-btn';
        btn.textContent='🎙️';
      }
    });
  });
}
</script>
</body>
</html>
